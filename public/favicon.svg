<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="ak-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4366e"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Cream circle background -->
  <circle cx="256" cy="256" r="250" fill="#f0e9e4"/>
  <circle cx="256" cy="256" r="244" fill="#faf7f5"/>

  <!-- Centered text group -->
  <g transform="translate(256, 256)">
    <!-- "AK" — shifted up from center -->
    <text
      x="0" y="-30"
      text-anchor="middle"
      dominant-baseline="auto"
      font-family="'Playfair Display', Georgia, serif"
      font-style="italic"
      font-weight="600"
      font-size="180"
      fill="url(#ak-grad)"
      letter-spacing="-4"
    >AK</text>

    <!-- "Dev" — shifted down from center -->
    <text
      x="0" y="110"
      text-anchor="middle"
      dominant-baseline="auto"
      font-family="'Playfair Display', Georgia, serif"
      font-style="italic"
      font-weight="500"
      font-size="130"
      fill="#1a1a2e"
      letter-spacing="2"
    >Dev</text>
  </g>
</svg>
